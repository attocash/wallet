name: Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_release: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.semantic.outputs.new_release_version != '' }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag || steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with:
          node-version: 'lts/*'

      - id: semantic
        name: Semantic Release Dry Run
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: cycjimmy/semantic-release-action@v6
        with:
          semantic_version: 24.2.7
          dry_run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    permissions:
      contents: read
    needs:
      - version
    uses: ./.github/workflows/build.yaml
    with:
      app_version: ${{ needs.version.outputs.version }}

  preview:
    permissions:
      contents: read
      checks: write
      pull-requests: write
    concurrency:
      group: "live"
      cancel-in-progress: false
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.details_url }}
    runs-on: ubuntu-latest
    needs:
      - build
    if: ${{ github.event_name == 'push' || github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ATTO_APPLICATION_LIVE }}
          channelId: preview
          expires: 30d
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      issues: write
      pull-requests: write
    needs:
      - version
      - build
      - preview
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.version.outputs.has_release == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Download Release Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Archive Web Distribution
        run: |
          mkdir -p build/release-assets
          tar -C artifacts/web -czf "build/release-assets/AttoWallet-web-${{ needs.version.outputs.version }}.tar.gz" .

      - name: Publish Release
        uses: cycjimmy/semantic-release-action@v6
        with:
          semantic_version: 24.2.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.version.outputs.tag }}" artifacts/linux/*.deb build/release-assets/*.tar.gz --clobber

      - id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ATTO_APPLICATION_LIVE }}
          channelId: live
