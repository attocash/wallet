name: Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    uses: ./.github/workflows/build.yaml

  release_version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - build
    outputs:
      has_release: ${{ steps.version.outputs.has_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - id: version
        name: Determine Release Version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes -p semantic-release@24.2.7 -p @semantic-release/commit-analyzer@13.0.1 -p @semantic-release/release-notes-generator@14.1.0 node ./scripts/next-release-version.mjs

  release_linux:
    runs-on: ubuntu-latest
    needs:
      - release_version
    if: ${{ needs.release_version.outputs.has_release == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build Linux Release Asset
        run: ./gradlew -Papp.version=${{ needs.release_version.outputs.version }} packageDeb

      - uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: composeApp/build/compose/binaries/main/deb/*.deb

  release_web:
    runs-on: ubuntu-latest
    needs:
      - release_version
    if: ${{ needs.release_version.outputs.has_release == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build Web Release Asset
        run: ./gradlew -Papp.version=${{ needs.release_version.outputs.version }} wasmJsBrowserDistribution

      - name: Archive Web Distribution
        run: |
          mkdir -p build/release-assets
          tar -C composeApp/build/dist/wasmJs/productionExecutable -czf "build/release-assets/AttoWallet-web-${{ needs.release_version.outputs.version }}.tar.gz" .

      - uses: actions/upload-artifact@v7
        with:
          name: release-web
          path: build/release-assets/*.tar.gz
  preview:
    concurrency:
      group: "live"
      cancel-in-progress: false
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.details_url }}
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ATTO_APPLICATION_LIVE }}
          channelId: preview
          expires: 30d
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      issues: write
      pull-requests: write
    needs:
      - release_version
      - release_linux
      - release_web
      - preview
    if: ${{ needs.release_version.outputs.has_release == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Download Release Artifacts
        uses: actions/download-artifact@v8
        with:
          path: build/release-assets

      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes -p semantic-release@24.2.7 -p @semantic-release/commit-analyzer@13.0.1 -p @semantic-release/release-notes-generator@14.1.0 -p @semantic-release/github@11.0.6 semantic-release

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release_version.outputs.tag }}" build/release-assets/release-linux/* build/release-assets/release-web/* --clobber

      - id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ATTO_APPLICATION_LIVE }}
          channelId: live
