# Managed by management-terraform

on:
  workflow_call:
    inputs:
      app_version:
        required: false
        type: string
        default: ""

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ inputs.app_version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v6

      - name: Desktop Test
        run: |
          if [ -n "$APP_VERSION" ]; then
            ./gradlew -Papp.version="$APP_VERSION" composeApp:desktopTest
          else
            ./gradlew composeApp:desktopTest
          fi

      - name: Package Deb
        run: |
          if [ -n "$APP_VERSION" ]; then
            ./gradlew -Papp.version="$APP_VERSION" packageDeb
          else
            ./gradlew packageDeb
          fi

      - name: Rename binary with platform suffix
        run: |
          file=$(ls composeApp/build/compose/binaries/main/deb/*.deb)
          mv "$file" "${file%.deb}-Debian.deb"

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: composeApp/build/compose/binaries/main/deb/*-Debian.deb
