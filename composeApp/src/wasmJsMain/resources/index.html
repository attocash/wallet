<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=3,user-scalable=yes"
          name="viewport">
    <meta name="description"
          content="Discover the full potential of Atto with the official web wallet. Send and receive lightning-fast transactions, manage your account seamlessly, and stay in control with collaborative consensus. No central authority, no waiting—just pure electronic cash.">

    <!-- Open Graph -->
    <meta property="og:title" content="Atto Wallet – Lightning-Fast & Secure Crypto Web Wallet">
    <meta property="og:description"
          content="Discover the full potential of Atto with the official web wallet. Send and receive lightning-fast transactions, manage your account seamlessly, and stay in control with collaborative consensus. No central authority, no waiting—just pure electronic cash.">
    <meta property="og:image" content="https://atto.cash/img/atto-social-card.jpg">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://wallet.atto.cash">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Atto Wallet – Lightning-Fast & Secure Crypto Web Wallet”">
    <meta name="twitter:description"
          content="Discover the full potential of Atto with the official web wallet. Send and receive lightning-fast transactions, manage your account seamlessly, and stay in control with collaborative consensus. No central authority, no waiting—just pure electronic cash.">
    <meta name="twitter:image" content="https://atto.cash/img/atto-social-card.jpg">
    <meta name="twitter:site" content="@AttoCash">

    <link rel="canonical" href="https://wallet.atto.cash">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Atto Wallet">
    <title>Atto Wallet – Lightning-Fast & Secure Crypto Web Wallet</title>

    <!-- Warm up wallet backend origins used by the web app. This reduces connect latency,
         but it does not remove CORS preflight requests for non-simple API calls. -->
    <link rel="dns-prefetch" href="//gatekeeper.live.application.atto.cash">
    <link rel="dns-prefetch" href="//wallet-gatekeeper.live.application.atto.cash">
    <link rel="preconnect" href="https://gatekeeper.live.application.atto.cash" crossorigin>
    <link rel="preconnect" href="https://wallet-gatekeeper.live.application.atto.cash" crossorigin>

    <!-- Favicons (modern minimal set) -->
    <link rel="icon" href="logo.svg" type="image/svg+xml">
    <link rel="icon" href="logo.ico" sizes="any">
    <link rel="apple-touch-icon" sizes="180x180" href="logo-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="logo-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="logo-512.png">
    <link rel="preload" href="logo.svg" as="image" type="image/svg+xml">
    <link rel="preload" href="logo.ico" as="image" type="image/x-icon">
    <link rel="preload"
          href="composeResources/attowallet.composeapp.generated.resources/font/noto_sans_variable.ttf"
          as="font"
          type="font/ttf"
          crossorigin>

    <!-- Structured Data for SoftwareApplication -->
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebApplication",
            "name": "Atto Wallet",
            "operatingSystem": "Web",
            "applicationCategory": "Finance, Cryptocurrency, Wallet",
            "url": "https://wallet.atto.cash",
            "publisher": {
                "@type": "Organization",
                "@id": "https://atto.cash"
            }
        }
    </script>

    <script type="application/javascript" src="attoWallet.js"></script>
    <script type="application/javascript" src="service-worker-registration.js"></script>

    <style>
        /* reset */
        html, body { height: 100%; margin: 0; padding: 0; }
        /* prevent page scrollbars */
        body { overflow: hidden; }
        /* Compose host: fill viewport without causing scrollbars */
        #AttoWallet {
          position: fixed;         /* pin to viewport */
          inset: 0;                /* top/right/bottom/left = 0 */
          display: block;
          border: 0;               /* remove any default border */
          outline: none;           /* remove focus outline */
        }
        /* just in case some UA draws focus ring */
        #AttoWallet:focus { outline: none; }
    </style>
</head>
<body>
<div id="AttoWallet"></div>
</body>
</html>
